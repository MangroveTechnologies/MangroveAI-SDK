name: CI

# Runs on every push/PR — the SDK previously had ONLY a manual
# workflow_dispatch release workflow that *excluded* integration tests, so
# Oracle response-model drift shipped undetected (validate/pause/data_query/
# simulate/order_by). This job runs the unit suite always, and the live
# Oracle round-trip suite (tests/integration/test_oracle_live.py) whenever the
# MANGROVE_API_KEY secret is available — so contract drift fails a check
# instead of crashing a customer. (Full codegen-from-OpenAPI is the durable
# fix — tracked separately; this is the cheap trigger-flip that stops drift
# re-merging in the meantime.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable + dev)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Unit tests
        run: pytest tests/ --ignore=tests/integration -v
      - name: Live Oracle contract round-trips
        # Skips automatically (fixture skip) if the secret isn't configured —
        # so forks/PRs without the secret stay green, but the canonical repo
        # (secret set) catches SDK<->Oracle drift on every PR.
        env:
          MANGROVE_API_KEY: ${{ secrets.MANGROVE_API_KEY }}
        run: pytest tests/integration/test_oracle_live.py -v -m integration
